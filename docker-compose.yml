services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanagement
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanagement"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./TaskManagement.API
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskmanagement
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./taskmanagement.client
      args:
        # The browser talks to the API published on the host, not the container name.
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
